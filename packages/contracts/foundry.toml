[profile.default]
src = "src"
out = "out"
libs = ["lib"]
test = "test"
script = "script"
solc = "0.8.24"
optimizer = true
optimizer_runs = 200
via_ir = false
fuzz = { runs = 1000 }
invariant = { runs = 256, depth = 15 }

[profile.ci]
fuzz = { runs = 5000 }
invariant = { runs = 512, depth = 30 }

[rpc_endpoints]
alfajores = "${CELO_RPC_ALFAJORES}"
celo = "${CELO_RPC}"

[etherscan]
alfajores = { key = "${CELOSCAN_API_KEY}", url = "https://api-alfajores.celoscan.io/api" }
celo = { key = "${CELOSCAN_API_KEY}", url = "https://api.celoscan.io/api" }